<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revista ALIOS ONE</title>
  <meta name="description" content="A publicação digital da ALIOS ONE — engenharia real, máquinas com pulso, e o que ninguém mostra.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dark: #0a0f1e; --navy: #0F172A; --blue: #1E8AFF;
      --blue-glow: rgba(30, 138, 255, 0.15); --white: #ffffff;
      --gray-300: #cbd5e1; --gray-400: #94a3b8; --gray-500: #64748b; --gray-700: #334155;
      --orange: #FF6B2C;
    }
    html { background: var(--dark); }
    body { font-family: 'DM Sans', sans-serif; color: var(--gray-300); background: var(--dark); line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    h1, h2, h3 { font-family: 'Rajdhani', sans-serif; font-weight: 600; color: var(--white); line-height: 1.15; letter-spacing: -0.02em; }

    .topo { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; max-width: 1100px; margin: 0 auto; }
    .topo a { color: var(--gray-400); text-decoration: none; font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.3s; }
    .topo a:hover { color: var(--blue); }
    .topo img { height: 28px; width: auto; display: block; }

    .heroi { max-width: 1100px; margin: 0 auto; padding: 3.5rem 2rem 2.5rem; }
    .heroi .rotulo { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; color: var(--blue); font-size: 0.85rem; margin-bottom: 0.6rem; }
    .heroi h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); margin-bottom: 0.8rem; }
    .heroi p { color: var(--gray-400); max-width: 60ch; }

    .grelha { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    .cartao {
      background: var(--navy);
      border: 1px solid rgba(30, 138, 255, 0.12);
      border-radius: 10px;
      padding: 1.8rem;
      text-decoration: none;
      transition: transform 0.25s, border-color 0.25s;
      display: block;
    }
    a.cartao:hover { transform: translateY(-4px); border-color: var(--blue); }
    .cartao .num { font-family: 'Rajdhani', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange); margin-bottom: 0.5rem; }
    .cartao h2 { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .cartao .data { font-size: 0.8rem; color: var(--gray-500); margin-bottom: 0.8rem; }
    .cartao p { font-size: 0.9rem; color: var(--gray-400); }
    .cartao .ler { display: inline-block; margin-top: 1.1rem; font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); }
    .cartao.em-breve { opacity: 0.65; }
    .cartao.em-breve .ler { color: var(--gray-500); }

    .vazio { max-width: 1100px; margin: 0 auto; padding: 0 2rem 5rem; color: var(--gray-500); font-style: italic; }

    footer { border-top: 1px solid rgba(30, 138, 255, 0.06); padding: 2.5rem 0; text-align: center; }
    footer p { font-size: 0.8rem; color: var(--gray-500); }
  </style>
</head>
<body>

  <div class="topo">
    <a href="https://aliosone.one"><img src="../logo-nav.png" alt="ALIOS ONE"></a>
    <a href="https://aliosone.one">← voltar ao site</a>
  </div>

  <div class="heroi">
    <div class="rotulo">Revista</div>
    <h1>ALIOS ONE</h1>
    <p>A publicação digital da ALIOS ONE. Engenharia sem glamour, técnica descomplicada, opinião a contracorrente e conversas com máquinas — por edições, para folhear com tempo.</p>
  </div>

{{EDICOES}}

  <footer>
    <p>© 2026 ALIOS ONE™. Inovação digital para quem constrói.</p>
  </footer>

</body>
</html>
