# Configuração do painel de administração (Decap CMS)
# O login usa o GitHub via proxy de autenticação (base_url) — ver Fase 3.

backend:
  name: github
  repo: bbelchioravac-design/aliosone
  branch: main
  base_url: https://alios-admin-auth.bbelchior-avac.workers.dev
  commit_messages:
    create: "Novo artigo: {{slug}}"
    update: "Artigo actualizado: {{slug}}"
    delete: "Artigo removido: {{slug}}"
    uploadMedia: "Imagem adicionada: {{path}}"
    deleteMedia: "Imagem removida: {{path}}"

locale: pt

media_folder: "images"
public_folder: "/images"

slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: artigos
    label: Artigos
    folder: artigos
    create: true
    format: yaml-frontmatter
    extension: md
    identifier_field: titulo
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo]
    fields:
      - { name: titulo, label: Título, widget: string }
      - { name: data, label: Data, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - name: tag
        label: Tema
        widget: select
        options: ["Conforto & Energia", "Regulamentação", "IA no terreno", "Bastidores"]
      - { name: resumo, label: "Resumo (1 frase, aparece na montra)", widget: string }
      - name: seccao
        label: "Secção da revista"
        widget: select
        required: false
        options: ["Editorial", "AVAC sem glamour", "Descomplicador", "Contracorrente", "Conversas com Máquinas", "Última página"]
        hint: "Em que secção da Revista ALIOS ONE entra este artigo"
      - { name: edicao, label: "Edição da revista (número)", widget: number, required: false, value_type: int, hint: "Vazio = não entra na revista" }
      - { name: body, label: "Artigo (português)", widget: markdown }
      - { name: publicado, label: Publicado, widget: boolean, default: true, hint: "Desligar = rascunho, não aparece no site" }
      - { name: titulo_en, label: "Título (inglês)", widget: string, required: false }
      - { name: tag_en, label: "Tema (inglês)", widget: string, required: false, hint: "ex.: AI in the field" }
      - { name: resumo_en, label: "Resumo (inglês)", widget: string, required: false }
      - { name: corpo_en, label: "Artigo (inglês) — vazio = só sai a versão PT", widget: markdown, required: false }

  - name: edicoes
    label: "Revista — Edições"
    folder: edicoes
    create: true
    format: yaml-frontmatter
    extension: md
    identifier_field: titulo
    slug: "edicao-{{fields.numero}}"
    fields:
      - { name: numero, label: "Número", widget: number, value_type: int }
      - { name: titulo, label: "Título da edição (ex.: Verão 2026)", widget: string }
      - { name: data, label: Data, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: destaque, label: "Frase de capa (1 linha)", widget: string, required: false }
      - { name: publicado, label: Publicada, widget: boolean, default: false, hint: "Desligada = edição em preparação, não aparece" }
      - { name: body, label: "Nota editorial da capa (opcional)", widget: markdown, required: false }

  - name: investigacao
    label: Investigação
    folder: investigacao
    create: true
    format: yaml-frontmatter
    extension: md
    identifier_field: titulo
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [data, titulo]
    fields:
      - { name: titulo, label: Título, widget: string }
      - { name: data, label: Data, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: tag, label: Estado, widget: hidden, default: "Investigação em curso" }
      - { name: resumo, label: "Resumo (1-2 frases)", widget: string }
      - { name: body, label: "Texto da disclosure", widget: markdown }
      - { name: bio, label: "Nota de autor (rodapé)", widget: string, required: false }
      - { name: publicado, label: Publicado, widget: boolean, default: true }
